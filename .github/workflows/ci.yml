name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        cc: [clang, gcc]
        kernel: [ish, linux]
    steps:
      - uses: actions/checkout@v6
        with:
            submodules: true
      - uses: actions/setup-python@v6
        with:
            python-version: '3.x'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libarchive-dev sqlite3
          pip3 install meson ninja
      - name: Clone Linux
        if: matrix.kernel == 'linux'
        run: deps/clone-linux.sh
      - name: Build
        run: |
          meson build -Dengine=asbestos -Dkernel=${{matrix.kernel}}
          ninja -C build
        env:
          CC: ${{matrix.cc}}
      - name: Test
        if: matrix.kernel == 'ish'
        run: ninja -C build test

  build-mac:
    runs-on: macos-26
    strategy:
      matrix:
        kernel: [ish, linux]
    steps:
      - uses: actions/checkout@v6
        with:
            submodules: true
      - name: Install dependencies
        run: |
          brew install llvm lld ninja libarchive meson
      - name: Clone Linux
        if: matrix.kernel == 'linux'
        run: deps/clone-linux.sh
      - name: 验证 AArch64 rootfs 构建期打包器
        if: matrix.kernel == 'ish'
        shell: bash
        run: |
          meson setup "$RUNNER_TEMP/ish-rootfs-test-build" \
            -Dengine=asbestos -Dkernel=ish
          meson test -C "$RUNNER_TEMP/ish-rootfs-test-build" \
            apple_aarch64_rootfs apple_rootfs_seed --print-errorlogs
      - name: Build
        if: matrix.kernel == 'ish'
        run: xcodebuild -project iSH.xcodeproj -scheme iSH -arch arm64 -sdk iphoneos CODE_SIGNING_ALLOWED=NO
      - name: 验证 Apple 五切片后端选择门禁
        if: matrix.kernel == 'ish'
        run: tools/apple-core-gate.sh
      - name: 验证 watchOS Xcode 最终链接
        if: matrix.kernel == 'ish'
        shell: bash
        run: |
          set -euo pipefail
          artifacts="$PWD/build-apple-core"
          products="$RUNNER_TEMP/ish-watch-products"
          common=(
            -project iSH.xcodeproj
            -scheme iSHWatchLinkSmoke
            -configuration Release
            CODE_SIGNING_ALLOWED=NO
            ONLY_ACTIVE_ARCH=NO
            ISH_WATCH_ARTIFACT_ROOT="$artifacts"
            SYMROOT="$products"
          )

          xcodebuild "${common[@]}" -sdk watchos \
            ARCHS="arm64 arm64_32" WATCHOS_DEPLOYMENT_TARGET=10.0 build
          xcodebuild "${common[@]}" -sdk watchsimulator \
            ARCHS="arm64 x86_64" WATCHOS_DEPLOYMENT_TARGET=10.0 build

          device="$products/Release-watchos/iSHWatchLinkSmoke.app/iSHWatchLinkSmoke"
          simulator="$products/Release-watchsimulator/iSHWatchLinkSmoke.app/iSHWatchLinkSmoke"
          xcrun lipo "$device" -verify_arch arm64_32 arm64
          xcrun lipo "$simulator" -verify_arch arm64 x86_64

          verify_slice() {
            local binary=$1
            local arch=$2
            local platform=$3
            local minos=$4
            local metadata
            local symbols
            metadata=$(xcrun vtool -arch "$arch" -show-build "$binary")
            grep -q "platform $platform" <<< "$metadata"
            grep -q "minos $minos" <<< "$metadata"
            symbols=$(xcrun nm -arch "$arch" "$binary")
            grep -q ' _become_first_process$' <<< "$symbols"
            grep -Eq '[[:space:]]T[[:space:]]+_ish_apple_rootfs_seed_install$' \
              <<< "$symbols"
          }

          verify_slice "$device" arm64_32 WATCHOS 10.0
          verify_slice "$device" arm64 WATCHOS 26.0
          verify_slice "$simulator" arm64 WATCHOSSIMULATOR 10.0
          verify_slice "$simulator" x86_64 WATCHOSSIMULATOR 10.0
      - name: Build
        if: matrix.kernel == 'linux'
        run: xcodebuild -project iSH.xcodeproj -scheme iSH+Linux -arch x86_64 -sdk iphonesimulator CODE_SIGNING_ALLOWED=NO
